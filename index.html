<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>McDonald's and Levi Strauss: Anti-Americanism Is Hurting US Brands - Bloomberg</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      position: relative;
      width: 100%;
    }

    .article-img {
      display: block;
      width: 100vw;
      height: auto;
      position: relative;
      z-index: 1;
    }

    .hero-frame {
      position: absolute;
      top: 810px;
      left: 49%;
      transform: translateX(-50%);
      width: 55%;
      height: 470px;
      z-index: 20;
      overflow: hidden;
      pointer-events: auto;
      cursor: none;
      background: #fff;
      border: none;
      box-shadow: none;
    }

    #hero-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }

    .cart-cursor {
      position: absolute;
      left: 0;
      top: 0;
      width: 64px;
      height: 64px;
      pointer-events: none;
      z-index: 3;
      transform: translate(-50%, -50%);
      will-change: left, top, opacity;
      opacity: 0;
    }

    .cart-cursor img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      filter:
        brightness(0)
        contrast(1.2)
        drop-shadow(0 0 1px rgba(255,255,255,0.45));
    }
  </style>
</head>
<body>

<div class="container">
  <div class="hero-frame" id="heroFrame">
    <canvas id="hero-canvas"></canvas>

    <div class="cart-cursor" id="cartCursor" aria-hidden="true">
      <img src="cart.webp" alt="">
    </div>
  </div>

  <img
    class="article-img"
    src="screencapture-bloomberg-opinion-articles-2025-09-16-anti-americanism-is-hurting-us-brands-2025-10-06-09_30_19.png"
    alt="article screenshot"
  >
</div>

<script>
  const frame = document.getElementById("heroFrame");
  const canvas = document.getElementById("hero-canvas");
  const ctx = canvas.getContext("2d");
  const cartCursor = document.getElementById("cartCursor");

  let cw = 0;
  let ch = 0;
  let dpr = Math.min(window.devicePixelRatio || 1, 2);

  const brandImage = new Image();
  brandImage.src = "brand.png";

  const mouse = {
    x: 0,
    y: 0,
    targetX: 0,
    targetY: 0,
    prevX: 0,
    prevY: 0,
    vx: 0,
    vy: 0,
    speed: 0,
    inside: false
  };

  const cursorVisual = {
    x: 0,
    y: 0
  };

  let imagePlacement = null;
  let fragments = [];
  let rafId = null;

  const SETTINGS = {
    ringCount: 8,
    slicesMin: 24,
    slicesMax: 36,
    centerRadius: 10,
    repelRadius: 180,
    hardRadius: 86,
    maxBreakDistance: 170,
    overlapBoost: 20,
    imageScale: 0.97,
    imageMaxHeight: 0.96
  };

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function polygonCentroid(points) {
    let x = 0;
    let y = 0;

    for (const p of points) {
      x += p.x;
      y += p.y;
    }

    return {
      x: x / points.length,
      y: y / points.length
    };
  }

  function centerPointer() {
    mouse.x = cw * 0.5;
    mouse.y = ch * 0.5;
    mouse.targetX = mouse.x;
    mouse.targetY = mouse.y;
    mouse.prevX = mouse.x;
    mouse.prevY = mouse.y;
    cursorVisual.x = mouse.x;
    cursorVisual.y = mouse.y;
  }

  function resizeCanvas() {
    cw = frame.clientWidth;
    ch = frame.clientHeight;
    dpr = Math.min(window.devicePixelRatio || 1, 2);

    canvas.width = Math.floor(cw * dpr);
    canvas.height = Math.floor(ch * dpr);
    canvas.style.width = `${cw}px`;
    canvas.style.height = `${ch}px`;

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    if (brandImage.complete && brandImage.naturalWidth) {
      imagePlacement = getImagePlacement();
      buildFragments();
      drawFragments();
    }

    centerPointer();
  }

  function getImagePlacement() {
    const imgRatio = brandImage.naturalWidth / brandImage.naturalHeight;

    const maxW = cw * SETTINGS.imageScale;
    const maxH = ch * SETTINGS.imageMaxHeight;

    let drawW = maxW;
    let drawH = drawW / imgRatio;

    if (drawH > maxH) {
      drawH = maxH;
      drawW = drawH * imgRatio;
    }

    return {
      x: (cw - drawW) / 2,
      y: (ch - drawH) / 2,
      w: drawW,
      h: drawH
    };
  }

  function buildFragments() {
    fragments = [];

    const maxRadius = Math.hypot(imagePlacement.w / 2, imagePlacement.h / 2) * 1.03;

    const ringEdges = [SETTINGS.centerRadius];
    let currentRadius = SETTINGS.centerRadius;

    for (let i = 0; i < SETTINGS.ringCount; i++) {
      currentRadius += rand(maxRadius * 0.08, maxRadius * 0.18);
      ringEdges.push(Math.min(currentRadius, maxRadius));
    }

    ringEdges[ringEdges.length - 1] = maxRadius;

    const sliceCount = Math.floor(rand(SETTINGS.slicesMin, SETTINGS.slicesMax));

    const angleStops = [0];
    let total = 0;

    for (let i = 0; i < sliceCount; i++) {
      total += rand(0.08, 0.28);
      angleStops.push(total);
    }

    const finalAngle = angleStops[angleStops.length - 1];
    for (let i = 0; i < angleStops.length; i++) {
      angleStops[i] = (angleStops[i] / finalAngle) * Math.PI * 2;
    }

    for (let ring = 0; ring < ringEdges.length - 1; ring++) {
      const rInner = ringEdges[ring];
      const rOuter = ringEdges[ring + 1];

      for (let i = 0; i < sliceCount; i++) {
        const a0 = angleStops[i];
        const a1 = angleStops[i + 1];
        const aMid = (a0 + a1) * 0.5;

        const angleJitter0 = rand(-0.04, 0.04);
        const angleJitter1 = rand(-0.04, 0.04);
        const angleJitterMid = rand(-0.06, 0.06);

        const innerStretch = ring === 0 ? rand(0.25, 0.8) : rand(0.95, 1.06);
        const outerStretch = rand(0.98, 1.08);
        const burstStretch = rand(1.0, 1.12);
        const overlap = rand(6, SETTINGS.overlapBoost);

        const points = [
          {
            x: cw / 2 + Math.cos(a0 + angleJitter0) * Math.max(0, rInner - overlap * rand(0.15, 0.55)),
            y: ch / 2 + Math.sin(a0 + angleJitter0) * Math.max(0, rInner - overlap * rand(0.15, 0.55))
          },
          {
            x: cw / 2 + Math.cos(a0 + angleJitter0) * (rOuter * outerStretch + overlap * rand(0.08, 0.45)),
            y: ch / 2 + Math.sin(a0 + angleJitter0) * (rOuter * outerStretch + overlap * rand(0.08, 0.45))
          },
          {
            x: cw / 2 + Math.cos(aMid + angleJitterMid) * (rOuter * burstStretch + overlap * rand(0.16, 0.55)),
            y: ch / 2 + Math.sin(aMid + angleJitterMid) * (rOuter * burstStretch + overlap * rand(0.16, 0.55))
          },
          {
            x: cw / 2 + Math.cos(a1 + angleJitter1) * (rOuter * outerStretch + overlap * rand(0.08, 0.45)),
            y: ch / 2 + Math.sin(a1 + angleJitter1) * (rOuter * outerStretch + overlap * rand(0.08, 0.45))
          },
          {
            x: cw / 2 + Math.cos(a1 + angleJitter1) * Math.max(0, rInner * innerStretch - overlap * rand(0.08, 0.4)),
            y: ch / 2 + Math.sin(a1 + angleJitter1) * Math.max(0, rInner * innerStretch - overlap * rand(0.08, 0.4))
          },
          {
            x: cw / 2 + Math.cos(aMid) * Math.max(0, rInner * rand(0.9, 1.04)),
            y: ch / 2 + Math.sin(aMid) * Math.max(0, rInner * rand(0.9, 1.04))
          }
        ];

        const centroid = polygonCentroid(points);
        const ringFactor = ring / Math.max(1, ringEdges.length - 2);

        fragments.push({
          points,
          centroid,
          ringFactor,
          x: 0,
          y: 0,
          vx: 0,
          vy: 0,
          rotation: rand(-0.02, 0.02),
          rotationVelocity: 0,
          opacity: ring < 2 ? 1 : rand(0.92, 1),
          scale: rand(0.995, 1.01),
          drag: rand(0.84, 0.9),
          spring: rand(0.06, 0.095),
          angularSpring: rand(0.04, 0.08),
          breakStrength: rand(0.95, 1.18),
          tangentBias: rand(-1, 1),
          overlapBias: rand(0.92, 1.08),
          z: ring + Math.random() * 0.08
        });
      }
    }

    fragments.sort((a, b) => a.z - b.z);
  }

  function updateMouse() {
    mouse.prevX = mouse.x;
    mouse.prevY = mouse.y;

    mouse.x = lerp(mouse.x, mouse.targetX, 0.22);
    mouse.y = lerp(mouse.y, mouse.targetY, 0.22);

    mouse.vx = mouse.x - mouse.prevX;
    mouse.vy = mouse.y - mouse.prevY;
    mouse.speed = Math.sqrt(mouse.vx * mouse.vx + mouse.vy * mouse.vy);
  }

  function updateCursor() {
    if (!mouse.inside) {
      cartCursor.style.opacity = "0";
      return;
    }

    cursorVisual.x = lerp(cursorVisual.x, mouse.x, 0.34);
    cursorVisual.y = lerp(cursorVisual.y, mouse.y, 0.34);

    cartCursor.style.left = `${cursorVisual.x}px`;
    cartCursor.style.top = `${cursorVisual.y}px`;
    cartCursor.style.opacity = "1";
  }

  function updateFragments() {
    for (const frag of fragments) {
      const worldX = frag.centroid.x + frag.x;
      const worldY = frag.centroid.y + frag.y;

      let targetOffsetX = 0;
      let targetOffsetY = 0;
      let targetRotation = 0;

      if (mouse.inside) {
        const dx = worldX - mouse.x;
        const dy = worldY - mouse.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 0.0001;
        const influence = clamp(1 - d / SETTINGS.repelRadius, 0, 1);

        if (influence > 0) {
          const nx = dx / d;
          const ny = dy / d;

          const ringWeight = 0.35 + frag.ringFactor * 1.15;
          const breakAmount = Math.pow(influence, 1.1) * SETTINGS.maxBreakDistance * frag.breakStrength * ringWeight;

          targetOffsetX += nx * breakAmount;
          targetOffsetY += ny * breakAmount;

          const tx = -ny;
          const ty = nx;
          const tangentPush = influence * 26 * frag.tangentBias;
          targetOffsetX += tx * tangentPush;
          targetOffsetY += ty * tangentPush;

          targetRotation = influence * 0.2 * frag.tangentBias;
        }
      }

      frag.vx += (targetOffsetX - frag.x) * frag.spring;
      frag.vy += (targetOffsetY - frag.y) * frag.spring;

      frag.vx *= frag.drag;
      frag.vy *= frag.drag;

      frag.x += frag.vx;
      frag.y += frag.vy;

      if (mouse.inside) {
        const movedX = frag.centroid.x + frag.x;
        const movedY = frag.centroid.y + frag.y;
        const ndx = movedX - mouse.x;
        const ndy = movedY - mouse.y;
        const nd = Math.sqrt(ndx * ndx + ndy * ndy) || 0.0001;

        if (nd < SETTINGS.hardRadius) {
          const nnx = ndx / nd;
          const nny = ndy / nd;
          const targetX = mouse.x + nnx * SETTINGS.hardRadius;
          const targetY = mouse.y + nny * SETTINGS.hardRadius;

          frag.x = targetX - frag.centroid.x;
          frag.y = targetY - frag.centroid.y;
          frag.vx *= 0.18;
          frag.vy *= 0.18;
        }
      }

      frag.rotationVelocity += (targetRotation - frag.rotation) * frag.angularSpring;
      frag.rotationVelocity *= 0.84;
      frag.rotation += frag.rotationVelocity;
    }
  }

  function drawFragments() {
    ctx.clearRect(0, 0, cw, ch);

    for (const frag of fragments) {
      ctx.save();
      ctx.globalAlpha = frag.opacity;
      ctx.translate(frag.centroid.x + frag.x, frag.centroid.y + frag.y);
      ctx.rotate(frag.rotation);
      ctx.scale(frag.scale, frag.scale);
      ctx.translate(-frag.centroid.x, -frag.centroid.y);

      ctx.beginPath();
      ctx.moveTo(frag.points[0].x, frag.points[0].y);
      for (let i = 1; i < frag.points.length; i++) {
        ctx.lineTo(frag.points[i].x, frag.points[i].y);
      }
      ctx.closePath();
      ctx.clip();

      ctx.drawImage(
        brandImage,
        imagePlacement.x,
        imagePlacement.y,
        imagePlacement.w,
        imagePlacement.h
      );

      ctx.restore();
    }
  }

  function animate() {
    rafId = requestAnimationFrame(animate);
    updateMouse();
    updateCursor();
    updateFragments();
    drawFragments();
  }

  function setPointerPosition(clientX, clientY) {
    const rect = frame.getBoundingClientRect();
    mouse.targetX = clamp(clientX - rect.left, 0, cw);
    mouse.targetY = clamp(clientY - rect.top, 0, ch);
  }

  frame.addEventListener("pointerenter", (e) => {
    mouse.inside = true;
    setPointerPosition(e.clientX, e.clientY);
  });

  frame.addEventListener("pointermove", (e) => {
    mouse.inside = true;
    setPointerPosition(e.clientX, e.clientY);
  });

  frame.addEventListener("pointerleave", () => {
    mouse.inside = false;
    mouse.targetX = cw * 0.5;
    mouse.targetY = ch * 0.5;
    cartCursor.style.opacity = "0";
  });

  frame.addEventListener("touchstart", (e) => {
    if (!e.touches || !e.touches.length) return;
    mouse.inside = true;
    setPointerPosition(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });

  frame.addEventListener("touchmove", (e) => {
    if (!e.touches || !e.touches.length) return;
    mouse.inside = true;
    setPointerPosition(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });

  frame.addEventListener("touchend", () => {
    mouse.inside = false;
    mouse.targetX = cw * 0.5;
    mouse.targetY = ch * 0.5;
    cartCursor.style.opacity = "0";
  }, { passive: true });

  window.addEventListener("resize", resizeCanvas);

  brandImage.onload = () => {
    resizeCanvas();
    if (rafId) cancelAnimationFrame(rafId);
    animate();
  };
</script>

</body>
</html>
