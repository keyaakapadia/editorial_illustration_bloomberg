<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Article Image Overlay</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      width: 100%;
    }

    .article-frame {
      position: relative;
      width: 100%;
      line-height: 0;
      --overlay-top: 2.796%;
      --overlay-left: 22.5%;
      --overlay-width: 55%;
      --overlay-height: 1.528%;
    }

    .article-img {
      display: block;
      width: 100%;
      height: auto;
    }

    .interactive-overlay {
      position: absolute;
      top: var(--overlay-top);
      left: var(--overlay-left);
      width: var(--overlay-width);
      height: var(--overlay-height);
      overflow: hidden;
      cursor: none;
    }

    .interactive-overlay canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .cart-cursor {
      position: absolute;
      left: 0;
      top: 0;
      width: 64px;
      height: 64px;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: opacity 120ms ease;
      will-change: transform;
    }

    .interactive-overlay.is-active .cart-cursor {
      opacity: 1;
    }

    .cart-cursor img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      filter:
        brightness(0)
        contrast(1.2)
        drop-shadow(0 0 1px rgba(255, 255, 255, 0.45));
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="article-frame">
      <img
        class="article-img"
        src="screencapture-bloomberg-opinion-articles-2025-09-16-anti-americanism-is-hurting-us-brands-2025-10-06-09_30_19.png"
        alt="Article screenshot"
      >

      <div class="interactive-overlay" id="interactiveOverlay" aria-label="Interactive illustration">
        <canvas id="overlayCanvas"></canvas>
        <div class="cart-cursor" id="cartCursor" aria-hidden="true">
          <img src="cart.webp" alt="">
        </div>
      </div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById("interactiveOverlay");
    const canvas = document.getElementById("overlayCanvas");
    const ctx = canvas.getContext("2d");
    const cartCursor = document.getElementById("cartCursor");

    let cw = 0;
    let ch = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let imagePlacement = null;
    let fragments = [];
    let rafId = null;

    const brandImage = new Image();
    brandImage.src = "brand.png";

    const mouse = {
      x: 0,
      y: 0,
      targetX: 0,
      targetY: 0,
      prevX: 0,
      prevY: 0,
      vx: 0,
      vy: 0,
      speed: 0,
      isInside: false
    };

    const cursorVisual = {
      x: 0,
      y: 0
    };

    const SETTINGS = {
      ringCount: 9,
      slicesMin: 24,
      slicesMax: 40,
      centerRadius: 10,
      repelRadius: 190,
      hardRadius: 92,
      maxBreakDistance: 215,
      overlapBoost: 34
    };

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(start, end, amount) {
      return start + (end - start) * amount;
    }

    function setMouseToCenter() {
      mouse.x = cw * 0.5;
      mouse.y = ch * 0.5;
      mouse.targetX = cw * 0.5;
      mouse.targetY = ch * 0.5;
      mouse.prevX = cw * 0.5;
      mouse.prevY = ch * 0.5;
      cursorVisual.x = cw * 0.5;
      cursorVisual.y = ch * 0.5;
    }

    function resizeCanvas() {
      cw = overlay.clientWidth;
      ch = overlay.clientHeight;

      if (!cw || !ch) return;

      canvas.width = Math.floor(cw * dpr);
      canvas.height = Math.floor(ch * dpr);
      canvas.style.width = `${cw}px`;
      canvas.style.height = `${ch}px`;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      imagePlacement = getImagePlacement();
      buildFragments();

      if (!mouse.isInside) {
        setMouseToCenter();
      } else {
        mouse.targetX = clamp(mouse.targetX, 0, cw);
        mouse.targetY = clamp(mouse.targetY, 0, ch);
      }
    }

    function getImagePlacement() {
      const imgRatio = brandImage.naturalWidth / brandImage.naturalHeight;
      const viewRatio = cw / ch;

      let drawW;
      let drawH;

      if (imgRatio > viewRatio) {
        drawH = ch;
        drawW = drawH * imgRatio;
      } else {
        drawW = cw;
        drawH = drawW / imgRatio;
      }

      return {
        x: (cw - drawW) / 2,
        y: (ch - drawH) / 2,
        w: drawW,
        h: drawH
      };
    }

    function polygonCentroid(points) {
      let x = 0;
      let y = 0;

      for (const point of points) {
        x += point.x;
        y += point.y;
      }

      return {
        x: x / points.length,
        y: y / points.length
      };
    }

    function createFragmentCanvas(points) {
      const off = document.createElement("canvas");
      off.width = Math.ceil(cw * dpr);
      off.height = Math.ceil(ch * dpr);

      const offCtx = off.getContext("2d");
      offCtx.scale(dpr, dpr);

      offCtx.save();
      offCtx.beginPath();
      offCtx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) {
        offCtx.lineTo(points[i].x, points[i].y);
      }
      offCtx.closePath();
      offCtx.clip();

      offCtx.drawImage(
        brandImage,
        imagePlacement.x,
        imagePlacement.y,
        imagePlacement.w,
        imagePlacement.h
      );

      offCtx.restore();
      return off;
    }

    function buildFragments() {
      fragments = [];

      const maxRadius = Math.sqrt(cw * cw + ch * ch) * 0.84;
      const ringEdges = [SETTINGS.centerRadius];
      let currentRadius = SETTINGS.centerRadius;

      for (let i = 0; i < SETTINGS.ringCount; i++) {
        currentRadius += rand(55, 125);
        ringEdges.push(Math.min(currentRadius, maxRadius));
      }

      if (ringEdges[ringEdges.length - 1] < maxRadius) {
        ringEdges[ringEdges.length - 1] = maxRadius;
      }

      const sliceCount = Math.floor(rand(SETTINGS.slicesMin, SETTINGS.slicesMax));
      const angleStops = [0];
      let total = 0;

      for (let i = 0; i < sliceCount; i++) {
        total += rand(0.08, 0.28);
        angleStops.push(total);
      }

      const finalAngle = angleStops[angleStops.length - 1];
      for (let i = 0; i < angleStops.length; i++) {
        angleStops[i] = (angleStops[i] / finalAngle) * Math.PI * 2;
      }

      for (let ring = 0; ring < ringEdges.length - 1; ring++) {
        const rInner = ringEdges[ring];
        const rOuter = ringEdges[ring + 1];

        for (let i = 0; i < sliceCount; i++) {
          const a0 = angleStops[i];
          const a1 = angleStops[i + 1];
          const aMid = (a0 + a1) * 0.5;

          const angleJitter0 = rand(-0.055, 0.055);
          const angleJitter1 = rand(-0.055, 0.055);
          const angleJitterMid = rand(-0.09, 0.09);
          const innerStretch = ring === 0 ? rand(0.2, 0.8) : rand(0.9, 1.08);
          const outerStretch = rand(0.92, 1.14);
          const burstStretch = rand(1.0, 1.22);
          const overlap = rand(10, SETTINGS.overlapBoost);

          const points = [
            {
              x: cw / 2 + Math.cos(a0 + angleJitter0) * Math.max(0, rInner - overlap * rand(0.2, 0.9)),
              y: ch / 2 + Math.sin(a0 + angleJitter0) * Math.max(0, rInner - overlap * rand(0.2, 0.9))
            },
            {
              x: cw / 2 + Math.cos(a0 + angleJitter0) * (rOuter * outerStretch + overlap * rand(0.15, 0.75)),
              y: ch / 2 + Math.sin(a0 + angleJitter0) * (rOuter * outerStretch + overlap * rand(0.15, 0.75))
            },
            {
              x: cw / 2 + Math.cos(aMid + angleJitterMid) * (rOuter * burstStretch + overlap * rand(0.3, 1.0)),
              y: ch / 2 + Math.sin(aMid + angleJitterMid) * (rOuter * burstStretch + overlap * rand(0.3, 1.0))
            },
            {
              x: cw / 2 + Math.cos(a1 + angleJitter1) * (rOuter * outerStretch + overlap * rand(0.15, 0.75)),
              y: ch / 2 + Math.sin(a1 + angleJitter1) * (rOuter * outerStretch + overlap * rand(0.15, 0.75))
            },
            {
              x: cw / 2 + Math.cos(a1 + angleJitter1) * Math.max(0, rInner * innerStretch - overlap * rand(0.15, 0.7)),
              y: ch / 2 + Math.sin(a1 + angleJitter1) * Math.max(0, rInner * innerStretch - overlap * rand(0.15, 0.7))
            },
            {
              x: cw / 2 + Math.cos(aMid) * Math.max(0, rInner * rand(0.8, 1.08)),
              y: ch / 2 + Math.sin(aMid) * Math.max(0, rInner * rand(0.8, 1.08))
            }
          ];

          const canvasFrag = createFragmentCanvas(points);
          const centroid = polygonCentroid(points);
          const ringFactor = ring / Math.max(1, ringEdges.length - 2);
          const densityZone = Math.random();

          let opacity;
          if (densityZone < 0.18) opacity = rand(0.18, 0.34);
          else if (densityZone < 0.55) opacity = rand(0.3, 0.56);
          else opacity = rand(0.52, 0.9);

          if (ring === 0) opacity = rand(0.75, 1);
          if (ring === 1) opacity = Math.max(opacity, rand(0.58, 0.88));

          fragments.push({
            canvas: canvasFrag,
            centroid,
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            rotation: rand(-0.03, 0.03),
            rotationVelocity: 0,
            opacity,
            scale: rand(0.985, 1.03),
            drag: rand(0.82, 0.9),
            spring: rand(0.055, 0.095),
            angularSpring: rand(0.04, 0.08),
            ringFactor,
            breakStrength: rand(0.95, 1.35),
            tangentBias: rand(-1, 1),
            overlapBias: rand(0.9, 1.2),
            z: ring + Math.random() * 0.08
          });
        }
      }

      fragments.sort((a, b) => a.z - b.z);
    }

    function updateMouse() {
      mouse.prevX = mouse.x;
      mouse.prevY = mouse.y;
      mouse.x = lerp(mouse.x, mouse.targetX, 0.22);
      mouse.y = lerp(mouse.y, mouse.targetY, 0.22);
      mouse.vx = mouse.x - mouse.prevX;
      mouse.vy = mouse.y - mouse.prevY;
      mouse.speed = Math.sqrt(mouse.vx * mouse.vx + mouse.vy * mouse.vy);
    }

    function updateCursor() {
      cursorVisual.x = lerp(cursorVisual.x, mouse.x, 0.34);
      cursorVisual.y = lerp(cursorVisual.y, mouse.y, 0.34);
      cartCursor.style.left = `${cursorVisual.x}px`;
      cartCursor.style.top = `${cursorVisual.y}px`;
    }

    function updateFragments() {
      for (const frag of fragments) {
        const worldX = frag.centroid.x + frag.x;
        const worldY = frag.centroid.y + frag.y;
        const dx = worldX - mouse.x;
        const dy = worldY - mouse.y;
        const distance = Math.sqrt(dx * dx + dy * dy) || 0.0001;
        const influence = clamp(1 - distance / SETTINGS.repelRadius, 0, 1);

        let targetOffsetX = 0;
        let targetOffsetY = 0;
        let targetRotation = 0;

        if (influence > 0) {
          const nx = dx / distance;
          const ny = dy / distance;
          const ringWeight = 0.35 + frag.ringFactor * 1.15;
          const evidentBreak = Math.pow(influence, 1.1) * SETTINGS.maxBreakDistance * frag.breakStrength * ringWeight;

          targetOffsetX += nx * evidentBreak;
          targetOffsetY += ny * evidentBreak;

          const tx = -ny;
          const ty = nx;
          const tangentPush = influence * 36 * frag.tangentBias;
          targetOffsetX += tx * tangentPush;
          targetOffsetY += ty * tangentPush;

          const overlapPull = influence * 22 * frag.overlapBias;
          targetOffsetX += nx * overlapPull * 0.2;
          targetOffsetY += ny * overlapPull * 0.2;

          targetRotation = influence * 0.28 * frag.tangentBias;
        }

        frag.vx += (targetOffsetX - frag.x) * frag.spring;
        frag.vy += (targetOffsetY - frag.y) * frag.spring;
        frag.vx *= frag.drag;
        frag.vy *= frag.drag;
        frag.x += frag.vx;
        frag.y += frag.vy;

        const movedX = frag.centroid.x + frag.x;
        const movedY = frag.centroid.y + frag.y;
        const ndx = movedX - mouse.x;
        const ndy = movedY - mouse.y;
        const nearDistance = Math.sqrt(ndx * ndx + ndy * ndy) || 0.0001;

        if (nearDistance < SETTINGS.hardRadius) {
          const nnx = ndx / nearDistance;
          const nny = ndy / nearDistance;
          const targetX = mouse.x + nnx * SETTINGS.hardRadius;
          const targetY = mouse.y + nny * SETTINGS.hardRadius;

          frag.x = targetX - frag.centroid.x;
          frag.y = targetY - frag.centroid.y;
          frag.vx *= 0.18;
          frag.vy *= 0.18;
        }

        frag.rotationVelocity += (targetRotation - frag.rotation) * frag.angularSpring;
        frag.rotationVelocity *= 0.84;
        frag.rotation += frag.rotationVelocity;
      }
    }

    function drawFragments() {
      ctx.clearRect(0, 0, cw, ch);

      for (const frag of fragments) {
        ctx.save();
        ctx.globalAlpha = frag.opacity;
        ctx.translate(frag.centroid.x + frag.x, frag.centroid.y + frag.y);
        ctx.rotate(frag.rotation);
        ctx.scale(frag.scale, frag.scale);
        ctx.translate(-frag.centroid.x, -frag.centroid.y);
        ctx.drawImage(frag.canvas, 0, 0, cw, ch);
        ctx.restore();
      }
    }

    function animate() {
      rafId = requestAnimationFrame(animate);
      updateMouse();
      updateCursor();
      updateFragments();
      drawFragments();
    }

    function syncPointer(clientX, clientY) {
      const rect = overlay.getBoundingClientRect();
      mouse.targetX = clamp(clientX - rect.left, 0, cw);
      mouse.targetY = clamp(clientY - rect.top, 0, ch);
    }

    overlay.addEventListener("mouseenter", () => {
      mouse.isInside = true;
      overlay.classList.add("is-active");
    });

    overlay.addEventListener("mousemove", (event) => {
      mouse.isInside = true;
      overlay.classList.add("is-active");
      syncPointer(event.clientX, event.clientY);
    });

    overlay.addEventListener("mouseleave", () => {
      mouse.isInside = false;
      overlay.classList.remove("is-active");
      mouse.targetX = cw * 0.5;
      mouse.targetY = ch * 0.5;
    });

    overlay.addEventListener("touchstart", (event) => {
      if (!event.touches || !event.touches.length) return;
      mouse.isInside = true;
      overlay.classList.add("is-active");
      syncPointer(event.touches[0].clientX, event.touches[0].clientY);
    }, { passive: true });

    overlay.addEventListener("touchmove", (event) => {
      if (!event.touches || !event.touches.length) return;
      syncPointer(event.touches[0].clientX, event.touches[0].clientY);
    }, { passive: true });

    overlay.addEventListener("touchend", () => {
      mouse.isInside = false;
      overlay.classList.remove("is-active");
      mouse.targetX = cw * 0.5;
      mouse.targetY = ch * 0.5;
    });

    brandImage.onload = () => {
      resizeCanvas();
      setMouseToCenter();
      if (rafId) cancelAnimationFrame(rafId);
      animate();
    };

    window.addEventListener("resize", resizeCanvas);
  </script>
</body>
</html>
